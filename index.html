<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>MetaShunt Interface</title>
  <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body>
  <header class="topbar">
    <img src="./assets/metashuntLogo.png" alt="Logo" class="logo" />
    <div id="status" class="status">Ready</div>
  </header>

  <section class="controls">
    <div class="row">

      <div class="field">
        <label>Mode</label>
        <select id="mode">
          <option value="continuous">Continuous</option>
          <option value="burst">Burst</option>
        </select>
      </div>

      <div class="field mode-burst" style="display:none">
        <label>Freq (Hz)</label>
        <input type="number" id="burstHz" min="1" step="1" value="1000"/>
      </div>

      <div class="field mode-burst" style="display:none">
        <label>Trigger</label>
        <select id="trigger">
          <option value="immediate">Immediate</option>
          <option value="rising">Rising Current</option>
          <option value="falling">Falling Current</option>
          <option value="stage">Stage</option>
          <option value="manual">Manual (KEY2)</option>
        </select>
      </div>

      <div class="field mode-burst trig-current" style="display:none">
        <label>Level (µA)</label>
        <input type="number" id="triggerUA" step="1" value="1000"/>
      </div>

      <div class="field mode-burst trig-stage" style="display:none">
        <label>Stage #</label>
        <input type="number" id="stageIndex" min="0" step="1" value="0"/>
      </div>

      <div class="spacer"></div>

      <button id="startBtn" class="primary">Connect & Start</button>
      <button id="stopBtn" class="danger">Stop</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <div class="field">
        <label>Device</label>
        <div id="deviceInfo" class="device-info">Not connected</div>
      </div>
      <div class="spacer"></div>
      <button id="loadCsvBtn" class="ghost">Import Log</button>
      <button id="clearCsvBtn" class="ghost">Clear Imported Log</button>
      <button id="exportCsvBtn" class="ghost">Export as CSV</button>
      <button id="exportImgsBtn" class="ghost">Export PNGs</button>
    </div>
  </section>

  <main class="plots">
    <div class="card">
      <div class="card-head">
      </div>
      <div id="plot-current" class="plot"></div>
    </div>

    <div class="card">
      <div class="card-head">
      </div>
      <div id="plot-charge" class="plot"></div>
    </div>
  </main>

  <script src="./vendor/plotly.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
